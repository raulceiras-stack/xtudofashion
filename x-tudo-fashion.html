<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>X Tudo Fashion</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:    #FF0E5A;
      --red:     #FF3B1A;
      --grad:    linear-gradient(135deg, #FF0E5A 0%, #FF3B1A 100%);
      --dark:    #1A0A0E;
      --dark2:   #2E1018;
      --white:   #FFFFFF;
      --offwhite:#FFF5F7;
      --muted:   rgba(255,255,255,0.6);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--dark);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── BANNER ── */
    .banner {
      width: 100%;
      background: var(--grad);
      color: #fff;
      text-align: center;
      padding: 11px 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    /* ── TOPO / LOGO ── */
    .top {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 24px 28px;
      gap: 18px;
    }

    .logo-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      padding: 3px;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--dark);
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 1px;
      text-align: center;
    }

    .brand-name span {
      font-style: italic;
      font-weight: 500;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 300px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--grad);
      border-radius: 2px;
    }

    /* ── BOTÕES ── */
    .links {
      width: 100%;
      max-width: 480px;
      padding: 8px 22px 52px;
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      padding: 17px 24px;
      border-radius: 50px;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .btn:active { transform: scale(0.97); }

    .btn-fill {
      background: var(--grad);
      color: #fff;
      box-shadow: 0 4px 24px rgba(255,14,90,0.4);
    }
    .btn-fill:hover {
      box-shadow: 0 6px 30px rgba(255,14,90,0.55);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.2);
    }
    .btn-ghost:hover {
      border-color: rgba(255,14,90,0.6);
      background: rgba(255,14,90,0.08);
      transform: translateY(-1px);
    }

    .btn-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    .footer {
      width: 100%;
      max-width: 480px;
      padding: 20px 22px 40px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .footer-text {
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      text-align: center;
    }

    /* ── ANIMAÇÕES ── */
    @keyframes up {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .banner       { animation: up .4s ease both; }
    .top          { animation: up .5s .08s ease both; }
    .btn:nth-of-type(1) { animation: up .4s .25s ease both; }
    .btn:nth-of-type(2) { animation: up .4s .32s ease both; }
    .btn:nth-of-type(3) { animation: up .4s .39s ease both; }
    .btn:nth-of-type(4) { animation: up .4s .46s ease both; }
    .footer       { animation: up .4s .52s ease both; }
  </style>
</head>
